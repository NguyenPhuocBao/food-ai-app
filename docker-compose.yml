version: '3.8'

services:
  # 1. Cơ sở dữ liệu PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: food_app_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: food_app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - food_app_network
    restart: unless-stopped

  # 2. Giao diện quản lý Database
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: food_app_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - food_app_network
    restart: unless-stopped

  # 3. API Trí tuệ nhân tạo (YOLOv8 + FastAPI)
  food_ai_api:
    build:
      context: ./ai-models/classifier
      dockerfile: Dockerfile
    container_name: food_app_ai_api
    ports:
      - "8000:8000"
    networks:
      - food_app_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  food_app_network:
    driver: bridge